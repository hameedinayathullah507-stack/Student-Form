<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Form</title>
</head>

<body>
    <center>
        <div class="container">
            <h2 style="color: rgb(3, 0, 0);">STUDENT FORM</h2>
            <table border="1" cellspacing="2" cellpadding="5">
                <tr>
                    <th>Name</th>
                    <td><input type="text" placeholder="Enter Your Name" id="name"></td>
                </tr>
                <tr>
                    <th>Age</th>
                    <td><input type="number" id="age" placeholder="Enter Your Age"></td>
                </tr>
                <tr>
                    <th>Gender</th>
                    <td>
                        <input type="radio" id="male" name="gender" value="Male">
                        <label for="male">Male</label>

                        <input type="radio" id="female" name="gender" value="Female">
                        <label for="female">Female</label>

                    </td>
                </tr>
                <tr>
                    <th>
                        Course
                    </th>
                    <td>
                        <select id="course">
                            <option value="Java">Java</option>
                            <option value="Python">Python</option>
                            <option value="JavaScript">JavaScript</option>
                            <option value="C++">C++</option>
                            <option value="C">C</option>
                            <option value="Full Stack">Full Stack</option>
                            <option value="AI/ML">AI/ML</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <th>Email</th>
                    <td><input type="email" id="email" placeholder="Enter Your Email"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <button class="save" onclick="save()">Save</button>
                    </td>
                </tr>
            </table>
    </center>

    </div>

    <div class="result">
        <center>
            <table border="1" cellspacing="2" cellpadding="10" id="resultTable">
                <tr>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Course</th>
                    <th>Gender</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>

            </table>
        </center>
    </div>
    <script src="app.js"></script>
</body>


</html>
